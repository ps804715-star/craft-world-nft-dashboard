<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Craft World NFT — Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --bg3: #eeede8;
      --text: #1a1a18;
      --text2: #6b6b67;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --radius: 8px;
      --radius-lg: 12px;
      --green: #3B6D11;
      --green-bg: #EAF3DE;
      --amber: #854F0B;
      --amber-bg: #FAEEDA;
      --red: #A32D2D;
      --red-bg: #FCEBEB;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg2: #252523;
        --bg3: #2e2e2b;
        --text: #f0efe8;
        --text2: #9a9a94;
        --border: rgba(255,255,255,0.1);
        --border2: rgba(255,255,255,0.2);
        --green: #97C459;
        --green-bg: #173404;
        --amber: #EF9F27;
        --amber-bg: #412402;
        --red: #F09595;
        --red-bg: #501313;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; color: var(--text); background: var(--bg3); min-height: 100vh; }
    .app { max-width: 860px; margin: 0 auto; padding: 1.5rem 1rem; }
    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 10px; }
    .metric { background: var(--bg2); border-radius: var(--radius); padding: .75rem 1rem; }
    .mlabel { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
    .mval { font-size: 22px; font-weight: 500; }
    .g4 { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; }
    .g2 { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
    .pill { display: inline-block; padding: 3px 10px; border-radius: var(--radius); font-size: 12px; font-weight: 500; }
    .sec-title { font-size: 15px; font-weight: 500; margin-bottom: 10px; color: var(--text); }
    .muted { color: var(--text2); font-size: 13px; }
    .row-between { display: flex; justify-content: space-between; align-items: center; }
    .chain-wrap { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .cnode { padding: 5px 12px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity .15s; line-height: 1.4; }
    .cnode:hover { opacity: .8; }
    .arrow-ch { color: var(--text2); font-size: 13px; }
    label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 4px; margin-top: 10px; }
    select, input[type=number], input[type=text] {
      width: 100%; font-size: 13px; border: 0.5px solid var(--border2); border-radius: var(--radius);
      padding: 7px 10px; background: var(--bg); color: var(--text); outline: none;
    }
    select:focus, input:focus { box-shadow: 0 0 0 2px rgba(100,100,255,0.2); }
    .btn { padding: 7px 16px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 13px; cursor: pointer; transition: background .12s; }
    .btn:hover { background: var(--bg2); }
    .btn-primary { background: var(--bg2); font-weight: 500; }
    .btn-danger { color: var(--red); border-color: rgba(163,45,45,.3); }
    .machine-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 0.5px solid var(--border); }
    .machine-row:last-child { border-bottom: none; }
    .bar-wrap { flex: 1; height: 6px; background: var(--bg2); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; }
    .section { display: none; }
    .section.on { display: block; }
    .tab-bar { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
    .tab { padding: 6px 14px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 13px; cursor: pointer; color: var(--text2); background: var(--bg); transition: background .12s; }
    .tab.on { background: var(--bg2); color: var(--text); font-weight: 500; border-color: var(--border2); }
    .edit-icon { font-size: 11px; color: var(--text2); cursor: pointer; padding: 2px 6px; border: 0.5px solid var(--border); border-radius: 4px; margin-left: 6px; }
    .edit-icon:hover { background: var(--bg2); }
    .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 14px; }
    .modal-wrap { display: none; }
    .modal-wrap.open { display: block; }
    @media (max-width: 600px) {
      .g4 { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .machine-row { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div>
      <div style="font-size:20px;font-weight:500">Craft World NFT</div>
      <div class="muted">Dashboard de produção</div>
    </div>
    <button class="btn btn-primary" onclick="openModal('modal-addmachine')">+ Máquina</button>
  </div>

  <div class="chain-wrap" id="chain-row"></div>

  <div class="tab-bar">
    <div class="tab on" onclick="switchTab('visao',this)">Visão geral</div>
    <div class="tab" onclick="switchTab('maquinas',this)">Máquinas</div>
    <div class="tab" onclick="switchTab('upgrades',this)">Upgrades</div>
  </div>

  <div id="sec-visao" class="section on"></div>
  <div id="sec-maquinas" class="section"></div>
  <div id="sec-upgrades" class="section"></div>

  <!-- Modal: adicionar máquina -->
  <div id="modal-addmachine" class="modal-wrap">
    <div class="card" style="margin-top:10px">
      <div class="sec-title">Adicionar máquina</div>
      <div class="g2">
        <div><label>Tipo</label><select id="nm-type" onchange="refreshNmLevels()"><option>MUD</option><option>CLAY</option><option>SAND</option><option>COPPER</option><option>STEEL</option><option>SCREWS</option></select></div>
        <div><label>Nível</label><select id="nm-level"></select></div>
      </div>
      <label>Nome (opcional)</label>
      <input type="text" id="nm-name" placeholder="ex: MUD #1">
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-primary" onclick="addMachine()">Adicionar</button>
        <button class="btn" onclick="closeModal('modal-addmachine')">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- Modal: editar máquina -->
  <div id="modal-editmachine" class="modal-wrap">
    <div class="card" style="margin-top:10px">
      <div class="sec-title">Editar máquina</div>
      <input type="hidden" id="em-idx">
      <div class="g2">
        <div><label>Nome</label><input type="text" id="em-name"></div>
        <div><label>Nível</label><select id="em-level"></select></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-primary" onclick="saveMachine()">Guardar</button>
        <button class="btn" onclick="closeModal('modal-editmachine')">Cancelar</button>
      </div>
    </div>
  </div>

</div>

};

const UPG = {
  MUD:{3:'6 MUD',4:'2 CLAY',5:'2 SAND',6:'4 SAND',7:'6 SAND',8:'20 SAND',9:'35 SAND',10:'50 SAND',11:'2 COPPER',12:'3 COPPER',13:'5 COPPER',14:'8 COPPER',15:'12 COPPER',16:'16 COPPER',17:'21 COPPER',18:'26 COPPER',19:'32 COPPER',20:'39 COPPER',21:'47 COPPER',22:'55 COPPER',23:'64 COPPER',24:'75 COPPER',25:'17 STEEL'},
  CLAY:{2:'1 CLAY',3:'1 SAND',4:'10 CLAY',5:'4 SAND',6:'7 SAND',7:'11 SAND',8:'28 SAND',9:'1 COPPER',10:'2 COPPER',11:'3 COPPER',12:'5 COPPER',13:'9 COPPER',14:'14 COPPER',15:'19 COPPER',16:'26 COPPER',17:'33 COPPER',18:'42 COPPER',19:'52 COPPER',20:'13 STEEL',21:'15 STEEL',22:'19 STEEL',23:'22 STEEL',24:'27 STEEL',25:'32 STEEL'},
  SAND:{2:'1 SAND',3:'5 SAND',4:'10 SAND',5:'17 SAND',6:'27 SAND',7:'40 SAND',8:'60 SAND',9:'5 COPPER',10:'5 COPPER',11:'15 COPPER',12:'21 COPPER',13:'28 COPPER',14:'36 COPPER',15:'46 COPPER',16:'57 COPPER',17:'71 COPPER',18:'87 COPPER',19:'106 COPPER',20:'26 STEEL',21:'31 STEEL',22:'37 STEEL',23:'44 STEEL',24:'53 STEEL',25:'63 STEEL'},
  COPPER:{2:'1 COPPER',3:'2 COPPER',4:'5 COPPER',5:'12 COPPER',6:'20 COPPER',7:'29 COPPER',8:'40 COPPER',9:'52 COPPER',10:'66 COPPER',11:'83 COPPER',12:'102 COPPER',13:'25 STEEL',14:'30 STEEL',15:'36 STEEL',16:'42 STEEL',17:'50 STEEL',18:'59 STEEL',19:'70 STEEL',20:'82 STEEL',21:'95 STEEL',22:'37 SCREWS',23:'43 SCREWS',24:'50 SCREWS',25:'59 SCREWS'},

  SCREWS:{2:'3 SCREWS',3:'5 SCREWS',4:'7 SCREWS',5:'10 SCREWS',6:'13 SCREWS',7:'18 SCREWS',8:'24 SCREWS',9:'32 SCREWS',10:'42 SCREWS',11:'55 SCREWS',12:'72 SCREWS',13:'93 SCREWS',14:'120 SCREWS',15:'155 SCREWS'}
};

const TYPES = ['MUD','CLAY','SAND','COPPER','STEEL','SCREWS'];

let machines = [];
try { machines = JSON.parse(localStorage.getItem('cwn_machines') || '[]'); } catch(e) {}
function save() { try { localStorage.setItem('cwn_machines', JSON.stringify(machines)); } catch(e) {} }

function fmtN(n, dec=0) { return Number(n).toLocaleString('pt-PT', {minimumFractionDigits:dec, maximumFractionDigits:dec}); }
function phTotal(type) { return machines.filter(m=>m.type===type).reduce((s,m)=>{ const d=DATA[type][m.level-1]; return s+(d?d.ph:0); }, 0); }
function inputNeeded(type) { return machines.filter(m=>m.type===type).reduce((s,m)=>{ const d=DATA[type][m.level-1]; return s+(d ? d.ph*(d.inp/d.out) : 0); }, 0); }

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

let _activeTab = 'visao';
function switchTab(t, el) {
  _activeTab = t;
  _filterType = null;
  document.querySelectorAll('.section').forEach(s => s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(s => s.classList.remove('on'));
  document.getElementById('sec-' + t).classList.add('on');
  el.classList.add('on');
  render();
}

function renderChain() {
  document.getElementById('chain-row').innerHTML = CHAIN.map((m, i) => {
    const c = COLORS[m] || {bg:'#F1EFE8', tc:'#444441'};
    const ph = m === 'EARTH' ? '—' : fmtN(phTotal(m));
    return (i > 0 ? '<span class="arrow-ch">→</span>' : '') +
      `<div class="cnode" style="background:${c.bg};color:${c.tc}" onclick="filterMachines('${m}')">${m}<br><span style="font-size:10px;font-weight:400">${ph}/h</span></div>`;
  }).join('');
}

function renderVisao() {
  const totalM = machines.length;
  const tipos = TYPES.filter(t => machines.some(m => m.type === t)).length;
  const totalPh = TYPES.reduce((s,t) => s + phTotal(t), 0);
  const maxLv = machines.reduce((mx,m) => Math.max(mx, m.level), 0);

  let html = `<div class="g4" style="margin-bottom:14px">
    <div class="metric"><div class="mlabel">Máquinas</div><div class="mval">${totalM}</div></div>
    <div class="metric"><div class="mlabel">Tipos ativos</div><div class="mval">${tipos}/6</div></div>
    <div class="metric"><div class="mlabel">Prod. total/h</div><div class="mval" style="color:var(--green)">${fmtN(totalPh,1)}</div></div>
    <div class="metric"><div class="mlabel">Nível máx.</div><div class="mval">${maxLv || '—'}</div></div>
  </div>`;

  html += `<div class="sec-title">Produção por tipo</div>`;
  const maxPh = Math.max(...TYPES.map(t => phTotal(t)), 1);
  TYPES.forEach(t => {
    const ph = phTotal(t); const c = COLORS[t];
    const inp = inputNeeded(t);
    const inpMat = t === 'MUD' ? 'EARTH' : TYPES[TYPES.indexOf(t) - 1];
    const count = machines.filter(m => m.type === t).length;
    html += `<div class="machine-row">
      <div style="width:72px;font-size:13px;font-weight:500;padding:2px 7px;border-radius:6px;background:${c.bg};color:${c.tc}">${t}</div>
      <div style="width:28px;font-size:12px;color:var(--text2);text-align:center">${count}x</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${ph>0?Math.round(ph/maxPh*100):0}%;background:${c.tc}"></div></div>
      <div style="width:90px;text-align:right;font-size:13px;font-weight:500">${fmtN(ph,1)}/h</div>
      <div style="width:130px;text-align:right;font-size:11px;color:var(--text2)">usa ${fmtN(inp,1)} ${inpMat}/h</div>
    </div>`;
  });

  html += `<div class="sec-title" style="margin-top:16px">Balanço da cadeia</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:10px">`;
  TYPES.forEach((t, i) => {
    if (i === 0) return;
    const prod = phTotal(TYPES[i-1]);
    const need = inputNeeded(t);
    const diff = prod - need;
    const ok = need === 0 || diff >= 0;
    const c = COLORS[t];
    html += `<div class="card" style="padding:.75rem">
      <div style="font-size:11px;padding:2px 7px;border-radius:5px;background:${c.bg};color:${c.tc};display:inline-block;margin-bottom:6px">${TYPES[i-1]} → ${t}</div>
      <div style="font-size:13px;color:var(--text2)">Produz: <strong style="color:var(--text)">${fmtN(prod,1)}/h</strong></div>
      <div style="font-size:13px;color:var(--text2)">Precisa: <strong style="color:var(--text)">${fmtN(need,1)}/h</strong></div>
      <div style="margin-top:6px;font-size:13px;font-weight:500;color:${ok?'var(--green)':'var(--red)'}">
        ${need === 0 ? '—' : ok ? '+'+fmtN(diff,1)+' excesso' : fmtN(Math.abs(diff),1)+' em falta'}
      </div>
    </div>`;
  });
  html += `</div>`;

  document.getElementById('sec-visao').innerHTML = html;
}

let _filterType = null;
function filterMachines(t) { _filterType = t; _activeTab = 'maquinas'; document.querySelectorAll('.section').forEach(s=>s.classList.remove('on')); document.getElementById('sec-maquinas').classList.add('on'); document.querySelectorAll('.tab').forEach((el,i)=>{el.classList.remove('on');if(i===1)el.classList.add('on');}); renderMaquinas(); }

function renderMaquinas() {
  let list = _filterType ? machines.filter(m => m.type === _filterType) : machines;
  let html = '';
  if (_filterType) html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span class="muted">A mostrar: ${_filterType}</span><button class="btn" style="font-size:12px" onclick="_filterType=null;renderMaquinas()">Ver todas</button></div>`;
  if (list.length === 0) { html += '<div class="muted">Nenhuma máquina. Clica em "+ Máquina" para adicionar.</div>'; document.getElementById('sec-maquinas').innerHTML = html; return; }
  TYPES.forEach(t => {
    const ms = list.filter(m => m.type === t);
    if (!ms.length) return;
    const c = COLORS[t];
    html += `<div style="margin-bottom:14px"><div style="font-size:13px;font-weight:500;padding:3px 10px;border-radius:6px;background:${c.bg};color:${c.tc};display:inline-block;margin-bottom:8px">${t}</div>`;
    ms.forEach(m => {
      const idx = machines.indexOf(m);
      const d = DATA[t][m.level - 1];
      const maxLvl = DATA[t].length;
      const nextCost = UPG[t] && UPG[t][m.level + 1];
      const inpMat = t === 'MUD' ? 'EARTH' : TYPES[TYPES.indexOf(t) - 1];
      html += `<div class="card" style="margin-bottom:8px;padding:.75rem 1rem">
        <div class="row-between" style="margin-bottom:6px">
          <div style="font-weight:500">${m.name}<span class="edit-icon" onclick="editMachine(${idx})">editar</span></div>
          <div style="display:flex;gap:6px;align-items:center">
            <span class="pill" style="background:${c.bg};color:${c.tc}">Nv ${m.level}</span>
            ${m.level < maxLvl ? `<span class="pill" style="background:var(--amber-bg);color:var(--amber)">→ ${nextCost||'?'}</span>` : `<span class="pill" style="background:var(--green-bg);color:var(--green)">máx</span>`}
          </div>
        </div>
        <div style="display:flex;gap:16px;font-size:12px;color:var(--text2);flex-wrap:wrap">
          <span>Output: <strong style="color:var(--text)">${fmtN(d?d.out:0)} ${t}/ciclo</strong></span>
          <span>Taxa: <strong style="color:var(--text)">${fmtN(d?d.ph:0,1)}/h</strong></span>
          <span>Input: <strong style="color:var(--text)">${fmtN(d?d.inp:0)} ${inpMat}/ciclo</strong></span>
        </div>
        <button class="btn btn-danger" style="margin-top:8px;font-size:12px" onclick="removeMachine(${idx})">Remover</button>
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById('sec-maquinas').innerHTML = html;
}

function renderUpgrades() {
  let html = ''; let any = false;
  TYPES.forEach(t => {
    const ms = machines.filter(m => m.type === t && m.level < DATA[t].length);
    if (!ms.length) return;
    any = true;
    const c = COLORS[t];
    html += `<div style="margin-bottom:14px"><div style="font-size:13px;font-weight:500;padding:3px 10px;border-radius:6px;background:${c.bg};color:${c.tc};display:inline-block;margin-bottom:8px">${t}</div>`;
    ms.forEach(m => {
      const idx = machines.indexOf(m);
      const cur = DATA[t][m.level - 1]; const nxt = DATA[t][m.level];
      const cost = UPG[t] && UPG[t][m.level + 1];
      const gain = (nxt.ph - cur.ph).toFixed(2);
      html += `<div class="card" style="margin-bottom:8px;padding:.75rem 1rem">
        <div class="row-between" style="margin-bottom:6px">
          <div style="font-weight:500">${m.name}</div>
          <span class="pill" style="background:var(--amber-bg);color:var(--amber)">Nv ${m.level} → ${m.level+1}</span>
        </div>
        <div style="display:flex;gap:16px;font-size:12px;color:var(--text2);margin-bottom:8px;flex-wrap:wrap">
          <span>Custo: <strong style="color:var(--text)">${cost||'—'}</strong></span>
          <span>Ganho/h: <strong style="color:var(--green)">+${gain} ${t}</strong></span>
          <span>${fmtN(cur.ph,2)} → <strong style="color:var(--text)">${fmtN(nxt.ph,2)}/h</strong></span>
        </div>
        <button class="btn btn-primary" style="font-size:12px" onclick="doUpgrade(${idx})">Confirmar upgrade</button>
      </div>`;
    });
    html += `</div>`;
  });
  if (!any) html = '<div class="muted">Sem upgrades disponíveis, ou sem máquinas registadas.</div>';
  document.getElementById('sec-upgrades').innerHTML = html;
}

function render() {
  renderChain();
  if (_activeTab === 'visao') renderVisao();
  if (_activeTab === 'maquinas') renderMaquinas();
  if (_activeTab === 'upgrades') renderUpgrades();
}

function refreshNmLevels() {
  const t = document.getElementById('nm-type').value;
  document.getElementById('nm-level').innerHTML = DATA[t].map((_,i) => `<option value="${i+1}">Nível ${i+1}</option>`).join('');
}

function addMachine() {
  const t = document.getElementById('nm-type').value;
  const l = parseInt(document.getElementById('nm-level').value);
  const n = document.getElementById('nm-name').value.trim() || t + ' #' + (machines.filter(m=>m.type===t).length + 1);
  machines.push({type:t, level:l, name:n});
  save(); closeModal('modal-addmachine');
  document.getElementById('nm-name').value = '';
  render();
}

function removeMachine(idx) { machines.splice(idx, 1); save(); render(); }

function editMachine(idx) {
  const m = machines[idx];
  document.getElementById('em-idx').value = idx;
  document.getElementById('em-name').value = m.name;
  document.getElementById('em-level').innerHTML = DATA[m.type].map((_,i) => `<option value="${i+1}" ${i+1===m.level?'selected':''}>Nível ${i+1}</option>`).join('');
  openModal('modal-editmachine');
}

function saveMachine() {
  const idx = parseInt(document.getElementById('em-idx').value);
  machines[idx].name = document.getElementById('em-name').value.trim() || machines[idx].name;
  machines[idx].level = parseInt(document.getElementById('em-level').value);
  save(); closeModal('modal-editmachine'); render();
}

function doUpgrade(idx) {
  const m = machines[idx];
  if (m.level < DATA[m.type].length) { machines[idx].level++; save(); render(); }
}

refreshNmLevels();
render();
</script>
</body>
</html>
